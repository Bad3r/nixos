name: Install Lix
description: >-
  Install the digest-pinned Lix release with this flake's nix.conf baseline.
inputs:
  github-token:
    description: Token recorded as the github.com access-tokens conf entry.
    required: true
runs:
  using: composite
  steps:
    - name: Install Lix
      shell: bash
      env:
        # The pinned installer release also pins the Lix version. Keep
        # LIX_VERSION and INSTALLER_SHA256 at parity with
        # lixPackageSets.latest in the nixpkgs pin: the
        # ci-lix-installer-parity flake check fails when they drift.
        # install.lix.systems publishes no digest sidecar, so the sha256
        # is pinned first-use from the fetched 2.95.2 binary.
        LIX_VERSION: 2.95.2
        INSTALLER_SHA256: 57564e78a6d57126661fe5e793de70a72bacf9835ddb7c5c0cbfadf3db21545e
        # flake-self-attrs is required for this flake's
        # self.submodules = true and must be ambient: Lix enforces it
        # before flake.nix#nixConfig applies. Append-only on purpose: the
        # installer's own base conf already appends nix-command flakes,
        # and this payload is rewritten from a parsed key map with
        # unspecified order, so a plain experimental-features line here
        # can be emitted after an extra- append and silently drop it
        # (reproduced with Lix 2.95.2). abort-on-warn = false is the Lix
        # default, restated to record the decision that third-party
        # deprecated-syntax warnings stay non-fatal in CI.
        NIX_INSTALLER_EXTRA_CONF: |
          extra-experimental-features = pipe-operator flake-self-attrs
          abort-on-warn = false
          access-tokens = github.com=${{ inputs.github-token }}
      run: |-
        curl --proto '=https' --tlsv1.2 -sSf -o /tmp/lix-installer \
          "https://install.lix.systems/lix/$LIX_VERSION/lix-installer-x86_64-linux"
        echo "$INSTALLER_SHA256  /tmp/lix-installer" | sha256sum -c -
        chmod +x /tmp/lix-installer
        # act containers have no systemd; fall back to a root-only install.
        extra_args=()
        if [ -n "${ACT:-}" ]; then extra_args+=(--init none); fi
        # The installer appends /nix/var/nix/profiles/default/bin to
        # GITHUB_PATH itself (ConfigureShellProfile); sudo -E keeps the
        # variable visible to it.
        sudo -E /tmp/lix-installer install linux --no-confirm \
          "${extra_args[@]}"
