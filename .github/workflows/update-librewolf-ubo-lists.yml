---
name: Update LibreWolf uBO Lists
"on":
  schedule:
    - cron: "15 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-librewolf-ubo-lists:
    runs-on: ubuntu-latest
    env:
      LIST_FILE: modules/browsers/_librewolf-ubo-default-lists.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update generated list
        id: update
        run: |
          .github/scripts/update-librewolf-ubo-lists.sh

          if git diff --quiet -- "$LIST_FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No LibreWolf uBO list changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "LibreWolf uBO list changes detected"
          fi

      - name: Show generated diff
        if: steps.update.outputs.changed == 'true'
        run: |
          {
            echo "## LibreWolf uBO List Diff"
            echo '```diff'
            git diff -- "$LIST_FILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        id: cpr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ublock): update LibreWolf filter lists"
          title: "chore(ublock): update LibreWolf filter lists"
          body: |
            ## Summary
            - Refresh generated uBlock Origin default filter lists.
            - Source: LibreWolf upstream uBO assets catalog.

            ## Test plan
            - Generated by `.github/scripts/update-librewolf-ubo-lists.sh`
            - Repository checks validate the Nix module import path.
          branch: automated/librewolf-ubo-lists
          delete-branch: true
          labels: |
            type(dependency-update)
            origin(automated)
            area(automation)
            area(home-manager)

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
