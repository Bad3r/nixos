---
name: Update Flake Inputs
"on":
  schedule:
    - cron: "0 2 * * *" # Daily at 2 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.32.0/install
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
            abort-on-warn = false
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Prefer HTTPS for GitHub
        run: |
          URL="https://github.com/"
          git config --global url."$URL".insteadOf git@github.com:
          git config --global url."$URL".insteadOf ssh://git@github.com/

      - name: Update flake inputs
        id: update
        run: |
          inputs=$(nix flake metadata --json \
            | jq -r '.locks.nodes.root.inputs | keys[]')

          if [ -n "$inputs" ]; then
            for input in $inputs; do
              echo "Updating $input..."
              nix flake lock --update-input "$input" \
                || echo "Failed to update $input, skipping..."
            done
          fi

          # Check if flake.lock changed
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No updates available"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Flake inputs updated"
          fi

      - name: Check Nixpkgs lock health
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          send-statistics: false
          fail-mode: true
          # CEL has() only accepts field selectors, not bare variables.
          # Keep in sync with modules/meta/pre-commit.nix.
          condition: >-
            supportedRefs.contains(gitRef) && numDaysOld < 30
            && owner == 'Bad3r'

      - name: Sync firefoxpwa extension pin
        if: steps.update.outputs.changed == 'true'
        # pkgs.firefoxpwa may have bumped; refresh the AMO pin so the gecko
        # policy stays in sync before the flake check evaluates it.
        run: scripts/update-firefoxpwa-extension.py

      # "path:." bypasses the git fetcher: flake.nix sets
      # self.submodules = true, which would make any git-based self fetch
      # pull the private secrets submodule that CI cannot read. Secret
      # files are then absent, so the per-file pathExists guards evaluate
      # the secretless configuration and warn about disabled services.
      # --no-build: the flake checks include both host toplevels, and
      # building two desktop closures exceeds runner disk.
      - name: Run flake check
        if: steps.update.outputs.changed == 'true'
        run: nix flake check --accept-flake-config --no-build "path:."

      - name: Show updated inputs
        if: steps.update.outputs.changed == 'true'
        run: |
          {
            echo "## Updated Inputs"
            echo '```'
            nix flake metadata --json | jq -r '
              .locks.nodes | to_entries[]
              | select(.value.locked)
              | "\(.key): \(.value.locked.rev // .value.locked.narHash)"
            '
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        id: cpr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(flake.lock): automated daily update"
          title: "chore(flake.lock): automated daily update"
          body: |
            ## Automated Flake Input Update

            This PR updates all flake inputs to their latest versions.

            ### Validation
            - ✅ Flake inputs updated successfully
            - ✅ `nix flake check --accept-flake-config --no-build "path:."`
              passed (secretless evaluation, issue #327)

            ### Changed Inputs
            See the commit diff for detailed changes to `flake.lock`.

            ### Next Steps
            Review the changes and merge if everything looks good.

            ---
            *Automated by update-flake.yml workflow*
          branch: automated/flake-update
          delete-branch: true
          labels: |
            type(dependency-update)
            origin(automated)
            area(flake)

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
