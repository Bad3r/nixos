---
name: Update Flake Inputs
"on":
  schedule:
    - cron: "0 2 * * *" # Daily at 2 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # self.submodules = true makes the nixpkgs/home-manager/stylix path
          # inputs resolve through the inputs/<name> submodule trees, so the
          # nix flake metadata/check steps below need them materialized.
          submodules: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.32.0/install
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
            abort-on-warn = false
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Prefer HTTPS for GitHub
        run: |
          URL="https://github.com/"
          git config --global url."$URL".insteadOf git@github.com:
          git config --global url."$URL".insteadOf ssh://git@github.com/

      - name: Update flake inputs
        id: update
        run: |
          # Update all inputs except secrets (requires private SSH access) and
          # the submodule-backed maintained inputs. Path-type lock entries
          # (inputs/<name> submodules) cannot be re-locked with --update-input;
          # they are bumped by moving the submodule gitlink (see
          # docs/guides/maintained-flake-inputs.md), so skip them here.
          inputs=$(nix flake metadata --json \
            | jq -r '
                .locks.nodes as $nodes
                | $nodes.root.inputs
                | to_entries[]
                | select((.value | type) == "string")
                | select($nodes[.value].locked.type != "path")
                | .key
              ' \
            | grep -v "^secrets$" || true)

          if [ -n "$inputs" ]; then
            for input in $inputs; do
              echo "Updating $input..."
              nix flake lock --update-input "$input" \
                || echo "Failed to update $input, skipping..."
            done
          fi

          # Check if flake.lock changed
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No updates available"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Flake inputs updated (excluding secrets)"
          fi

      - name: Run flake check
        if: steps.update.outputs.changed == 'true'
        run: nix flake check --accept-flake-config

      - name: Show updated inputs
        if: steps.update.outputs.changed == 'true'
        run: |
          {
            echo "## Updated Inputs"
            echo '```'
            nix flake metadata --json | jq -r '
              .locks.nodes | to_entries[]
              | select(.value.locked)
              | "\(.key): \(.value.locked.rev // .value.locked.narHash)"
            '
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(flake.lock): automated daily update"
          title: "chore(flake.lock): automated daily update"
          body: |
            ## Automated Flake Input Update

            This PR updates all flake inputs to their latest versions.

            ### Validation
            - ✅ Flake inputs updated successfully (excluding `secrets`)
            - ✅ `nix flake check --accept-flake-config` passed

            ### Excluded Inputs
            - `secrets` - Requires private authentication, updated manually
            - Submodule-backed maintained inputs (`type = "path"`) are bumped
              via submodule gitlink updates, not `--update-input`

            ### Changed Inputs
            See the commit diff for detailed changes to `flake.lock`.

            ### Next Steps
            Review the changes and merge if everything looks good.

            ---
            *Automated by update-flake.yml workflow*
          branch: automated/flake-update
          delete-branch: true
          labels: |
            type(dependency-update)
            origin(automated)
            area(flake)
