---
name: Update Flake Inputs
"on":
  schedule:
    - cron: "0 2 * * *" # Daily at 2 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Lix
        env:
          # The pinned installer release also pins the Lix version; keep at
          # parity with lixPackageSets.latest in the nixpkgs fork.
          NIX_INSTALLER_EXTRA_CONF: |
            experimental-features = nix-command flakes pipe-operator
            extra-experimental-features = flake-self-attrs
            abort-on-warn = false
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf -o /tmp/lix-installer \
            https://install.lix.systems/lix/2.95.2/lix-installer-x86_64-linux
          chmod +x /tmp/lix-installer
          # act containers have no systemd; fall back to a root-only install.
          extra_args=()
          if [ -n "${ACT:-}" ]; then extra_args+=(--init none); fi
          sudo -E /tmp/lix-installer install linux --no-confirm \
            "${extra_args[@]}"

      - name: Prefer HTTPS for GitHub
        run: |
          URL="https://github.com/"
          git config --global url."$URL".insteadOf git@github.com:
          git config --global url."$URL".insteadOf ssh://git@github.com/

      - name: Update flake inputs
        id: update
        # path:. reads the checkout directly instead of the git fetcher, which
        # would pull the unreadable secrets submodule (self.submodules = true)
        # and fail; path:. still writes flake.lock back to the working tree.
        # pipefail surfaces a metadata failure instead of masking it as an empty
        # input list and a green "No updates available" no-op.
        run: |
          set -eo pipefail
          inputs=$(nix flake metadata --json "path:." \
            | jq -r '.locks.nodes.root.inputs | keys[]')

          failures=0
          total=0
          if [ -n "$inputs" ]; then
            for input in $inputs; do
              total=$((total + 1))
              echo "Updating $input..."
              # Lix rejects a relative --flake ref ("cannot fetch input
              # 'path:.' because it uses a relative path"); the absolute
              # form keeps the same write-back behavior.
              nix flake update "$input" --flake "path:$PWD" || {
                echo "Failed to update $input, skipping..."
                failures=$((failures + 1))
              }
            done
          fi

          # A single per-input failure stays best-effort, but every input
          # failing is a systemic outage, not a genuine "everything current"
          # day: fail so it is not masked as a green changed=false.
          if [ "$total" -gt 0 ] && [ "$failures" -eq "$total" ]; then
            echo "All $total flake input updates failed" >&2
            exit 1
          fi

          # Check if flake.lock changed
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No updates available"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Flake inputs updated"
          fi

      - name: Check Nixpkgs lock health
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          send-statistics: false
          fail-mode: true
          # CEL has() only accepts field selectors, not bare variables.
          # Keep in sync with modules/meta/pre-commit.nix.
          condition: >-
            supportedRefs.contains(gitRef) && numDaysOld < 30
            && owner == 'Bad3r'

      - name: Sync firefoxpwa extension pin
        if: steps.update.outputs.changed == 'true'
        # pkgs.firefoxpwa may have bumped; refresh the AMO pin so the gecko
        # policy stays in sync before the flake check evaluates it.
        run: scripts/update-firefoxpwa-extension.py

      # "path:." bypasses the git fetcher: flake.nix sets
      # self.submodules = true, which would make any git-based self fetch
      # pull the private secrets submodule that CI cannot read. Secret
      # files are then absent, so the per-file pathExists guards evaluate
      # the secretless configuration and warn about disabled services.
      # --no-build: the flake checks include every host toplevel, and
      # building desktop closures exceeds runner disk.
      - name: Run flake check
        if: steps.update.outputs.changed == 'true'
        run: nix flake check --accept-flake-config --no-build "path:."

      - name: Free disk space
        if: steps.update.outputs.changed == 'true'
        # Reclaim ~15 GB of preinstalled toolchains so a host closure fits.
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc

      # Realise every host closure, one at a time (a single closure fits the
      # runner disk, several at once do not, hence --no-build on the flake
      # check and the garbage collection between hosts). Gates the
      # auto-merged PR on actual builds: a lock bump that evaluates but fails
      # to build (broken patch, a package that no longer compiles) fails the
      # run before the PR is created and merged. The host list comes from the
      # flake, so a new host is covered without editing this workflow.
      - name: Build host closures
        if: steps.update.outputs.changed == 'true'
        run: |
          hosts=$(nix eval --accept-flake-config --json \
            "path:.#nixosConfigurations" --apply builtins.attrNames \
            | jq -r '.[]')
          if [ -z "$hosts" ]; then
            echo "no nixosConfigurations found" >&2
            exit 1
          fi
          first=1
          for host in $hosts; do
            if [ "$first" -eq 1 ]; then
              first=0
            else
              nix store gc
            fi
            echo "Building $host closure..."
            nix build --accept-flake-config --no-link -L \
              "path:.#nixosConfigurations.$host.config.system.build.toplevel"
          done

      - name: Show updated inputs
        if: steps.update.outputs.changed == 'true'
        # path:. avoids the git self-fetch of the unreadable secrets submodule.
        run: |
          {
            echo "## Updated Inputs"
            echo '```'
            nix flake metadata --json "path:." | jq -r '
              .locks.nodes | to_entries[]
              | select(.value.locked)
              | "\(.key): \(.value.locked.rev // .value.locked.narHash)"
            '
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        id: cpr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(flake.lock): automated daily update"
          title: "chore(flake.lock): automated daily update"
          body: |
            ## Automated Flake Input Update

            This PR updates all flake inputs to their latest versions.

            ### Validation
            - ✅ Flake inputs updated successfully
            - ✅ `nix flake check --accept-flake-config --no-build "path:."`
              passed (secretless evaluation, issue #327)

            ### Changed Inputs
            See the commit diff for detailed changes to `flake.lock`.

            ### Next Steps
            Review the changes and merge if everything looks good.

            ---
            *Automated by update-flake.yml workflow*
          branch: automated/flake-update
          delete-branch: true
          labels: |
            type(dependency-update)
            origin(automated)
            area(flake)

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
