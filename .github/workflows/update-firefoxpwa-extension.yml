---
name: Update FirefoxPWA Extension Pin
"on":
  schedule:
    - cron: "30 0 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-firefoxpwa-extension:
    runs-on: ubuntu-latest
    env:
      PIN_FILE: modules/browsers/_firefoxpwa-extension-pin.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Lix
        env:
          # The pinned installer release also pins the Lix version; keep at
          # parity with lixPackageSets.latest in the nixpkgs fork.
          NIX_INSTALLER_EXTRA_CONF: |
            experimental-features = nix-command flakes pipe-operator
            extra-experimental-features = flake-self-attrs
            abort-on-warn = false
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf -o /tmp/lix-installer \
            https://install.lix.systems/lix/2.95.2/lix-installer-x86_64-linux
          chmod +x /tmp/lix-installer
          # act containers have no systemd; fall back to a root-only install.
          extra_args=()
          if [ -n "${ACT:-}" ]; then extra_args+=(--init none); fi
          sudo -E /tmp/lix-installer install linux --no-confirm \
            "${extra_args[@]}"

      - name: Sync extension pin
        id: update
        run: |
          scripts/update-firefoxpwa-extension.py

          if git diff --quiet -- "$PIN_FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No FirefoxPWA extension pin changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "FirefoxPWA extension pin changes detected"
          fi

      - name: Show generated diff
        if: steps.update.outputs.changed == 'true'
        run: |
          {
            echo "## FirefoxPWA Extension Pin Diff"
            echo '```diff'
            git diff -- "$PIN_FILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        id: cpr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(firefoxpwa): sync management-extension pin"
          title: "chore(firefoxpwa): sync management-extension pin"
          body: |
            ## Summary
            - Refresh the generated firefoxpwa management-extension pin.
            - Source: addons.mozilla.org, matched to the connector version.

            ## Test plan
            - Generated by `scripts/update-firefoxpwa-extension.py`
            - Repository checks validate the Nix module import path.
          branch: automated/firefoxpwa-extension-pin
          delete-branch: true
          labels: |
            type(dependency-update)
            origin(automated)
            area(automation)
            area(home-manager)

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
