---
name: Update FirefoxPWA Extension Pin
"on":
  schedule:
    - cron: "30 0 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-firefoxpwa-extension:
    runs-on: ubuntu-latest
    env:
      PIN_FILE: modules/browsers/_firefoxpwa-extension-pin.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Lix
        uses: ./.github/actions/install-lix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync extension pin
        id: update
        run: |
          scripts/update-firefoxpwa-extension.py

          if git diff --quiet -- "$PIN_FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No FirefoxPWA extension pin changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "FirefoxPWA extension pin changes detected"
          fi

      - name: Show generated diff
        if: steps.update.outputs.changed == 'true'
        run: |
          {
            echo "## FirefoxPWA Extension Pin Diff"
            echo '```diff'
            git diff -- "$PIN_FILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        id: cpr
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(firefoxpwa): sync management-extension pin"
          title: "chore(firefoxpwa): sync management-extension pin"
          body: |
            ## Summary
            - Refresh the generated firefoxpwa management-extension pin.
            - Source: addons.mozilla.org, matched to the connector version.

            ## Test plan
            - Generated by `scripts/update-firefoxpwa-extension.py`
            - Repository checks validate the Nix module import path.
          branch: automated/firefoxpwa-extension-pin
          delete-branch: true
          labels: |
            type(dependency-update)
            origin(automated)
            area(automation)
            area(home-manager)

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
