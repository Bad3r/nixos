---
name: Claude Mention Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

jobs:
  claude-mention-assistant:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude')
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude')
      ) || (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude')
      ) || (
        github.event_name == 'issues' &&
        (
          contains(github.event.issue.body, '@claude') ||
          contains(github.event.issue.title, '@claude')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Mention Assistant
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Allow Claude to inspect CI results attached to PRs.
          additional_permissions: |
            actions: read

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Explicit model selection plus a minimal shell toolset for
          # repo inspection and GitHub workflow interaction.
          claude_args: >-
            --model claude-opus-4-6
            --allowedTools mcp__github_inline_comment__create_inline_comment
            --allowedTools Bash(git status:*)
            --allowedTools Bash(git diff:*)
            --allowedTools Bash(git show:*)
            --allowedTools Bash(git log:*)
            --allowedTools Bash(gh pr view:*)
            --allowedTools Bash(gh pr diff:*)
            --allowedTools Bash(gh issue view:*)

          # Optional: Advanced settings configuration.
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
