---
name: Dendritic Pattern Compliance Check
"on":
  workflow_dispatch:
jobs:
  flake-lock-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          submodules: true
          fetch-depth: 0
      - name: Check Nixpkgs lock health
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          send-statistics: false
          fail-mode: true
          condition: >-
            supportedRefs.contains(gitRef) && has(numDaysOld)
            && numDaysOld < 30 && owner == 'Bad3r'

  check-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          submodules: true
          fetch-depth: 0
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.32.0/install
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
            abort-on-warn = false
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Prefer HTTPS for GitHub
        run: |
          URL="https://github.com/"
          git config --global url."$URL".insteadOf git@github.com:
          git config --global url."$URL".insteadOf ssh://git@github.com/
      - name: Check flake
        run: nix flake check --extra-experimental-features pipe-operators
      - name: Build configurations
        run: |
          HOST=".#nixosConfigurations.system76"
          nix build "$HOST.config.system.build.toplevel" \
            --dry-run --extra-experimental-features pipe-operators

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          submodules: true
          fetch-depth: 0
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.32.0/install
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Check formatting
        run: nix fmt -- --check --extra-experimental-features pipe-operators

  module-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          submodules: true
          fetch-depth: 0
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.32.0/install
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Validate namespaces
        run: |
          # Forbid assigning a single module directly to a retired namespace.
          # Anchored on "=" so nested groups (flake.nixosModules.storage.x)
          # and hyphenated names (flake.nixosModules.boot-redundancy) pass.
          if grep -rqE "flake\.nixosModules\.desktop[[:space:]]*=" \
            modules/ --include="*.nix"; then exit 1; fi
          if grep -rqE "flake\.nixosModules\.audio[[:space:]]*=" \
            modules/ --include="*.nix"; then exit 1; fi
          if grep -rqE "flake\.nixosModules\.boot[[:space:]]*=" \
            modules/ --include="*.nix"; then exit 1; fi
          if grep -rqE "flake\.nixosModules\.storage[[:space:]]*=" \
            modules/ --include="*.nix"; then exit 1; fi
      - name: Check import-tree usage
        run: grep -q "import-tree.*modules" flake.nix || exit 1
      - name: Check no literal imports
        run: '! grep -r "imports.*\./" modules/ --include="*.nix" || exit 1'
