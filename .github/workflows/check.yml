---
name: Dendritic Pattern Compliance Check
"on":
  workflow_dispatch:
jobs:
  flake-lock-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          persist-credentials: false
      - name: Check Nixpkgs lock health
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          send-statistics: false
          fail-mode: true
          # CEL has() only accepts field selectors, not bare variables.
          # Keep in sync with modules/meta/pre-commit.nix.
          condition: >-
            supportedRefs.contains(gitRef) && numDaysOld < 30
            && owner == 'Bad3r'

  check-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          persist-credentials: false
      - name: Install Lix
        env:
          # The pinned installer release also pins the Lix version; keep at
          # parity with lixPackageSets.latest in the nixpkgs fork.
          NIX_INSTALLER_EXTRA_CONF: |
            experimental-features = nix-command flakes pipe-operator
            extra-experimental-features = flake-self-attrs
            abort-on-warn = false
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf -o /tmp/lix-installer \
            https://install.lix.systems/lix/2.95.2/lix-installer-x86_64-linux
          chmod +x /tmp/lix-installer
          # act containers have no systemd; fall back to a root-only install.
          extra_args=()
          if [ -n "${ACT:-}" ]; then extra_args+=(--init none); fi
          sudo -E /tmp/lix-installer install linux --no-confirm \
            "${extra_args[@]}"
      - name: Prefer HTTPS for GitHub
        run: |
          URL="https://github.com/"
          git config --global url."$URL".insteadOf git@github.com:
          git config --global url."$URL".insteadOf ssh://git@github.com/
      # "path:." bypasses the git fetcher: self.submodules = true would
      # make a git-based self fetch pull the private secrets submodule
      # that CI cannot read; the per-file pathExists guards then evaluate
      # the secretless configuration. --no-build: the flake checks include
      # every host toplevel, and building them exceeds runner disk.
      - name: Check flake
        run: nix flake check --accept-flake-config --no-build "path:."
      # Dry-run every host closure. The host list comes from the flake, so
      # a new host is covered without editing this workflow; an empty list
      # fails instead of passing vacuously.
      - name: Build configurations
        run: |
          hosts=$(nix eval --accept-flake-config --json \
            "path:.#nixosConfigurations" --apply builtins.attrNames \
            | jq -r '.[]')
          if [ -z "$hosts" ]; then
            echo "no nixosConfigurations found" >&2
            exit 1
          fi
          for host in $hosts; do
            echo "Dry-run building $host..."
            nix build --dry-run --accept-flake-config \
              "path:.#nixosConfigurations.$host.config.system.build.toplevel"
          done

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          persist-credentials: false
      - name: Install Lix
        env:
          # The pinned installer release also pins the Lix version; keep at
          # parity with lixPackageSets.latest in the nixpkgs fork.
          NIX_INSTALLER_EXTRA_CONF: |
            experimental-features = nix-command flakes pipe-operator
            extra-experimental-features = flake-self-attrs
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf -o /tmp/lix-installer \
            https://install.lix.systems/lix/2.95.2/lix-installer-x86_64-linux
          chmod +x /tmp/lix-installer
          # act containers have no systemd; fall back to a root-only install.
          extra_args=()
          if [ -n "${ACT:-}" ]; then extra_args+=(--init none); fi
          sudo -E /tmp/lix-installer install linux --no-confirm \
            "${extra_args[@]}"
      # nix fmt resolves .#formatter through the git fetcher, which would
      # pull the private secrets submodule; run the formatter from the
      # path-fetched flake instead.
      - name: Check formatting
        run: >-
          nix run --accept-flake-config
          "path:.#formatter.x86_64-linux" -- --ci

  module-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          persist-credentials: false
      - name: Install Lix
        env:
          # The pinned installer release also pins the Lix version; keep at
          # parity with lixPackageSets.latest in the nixpkgs fork.
          NIX_INSTALLER_EXTRA_CONF: |
            experimental-features = nix-command flakes pipe-operator
            extra-experimental-features = flake-self-attrs
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf -o /tmp/lix-installer \
            https://install.lix.systems/lix/2.95.2/lix-installer-x86_64-linux
          chmod +x /tmp/lix-installer
          # act containers have no systemd; fall back to a root-only install.
          extra_args=()
          if [ -n "${ACT:-}" ]; then extra_args+=(--init none); fi
          sudo -E /tmp/lix-installer install linux --no-confirm \
            "${extra_args[@]}"
      - name: Validate namespaces
        run: |
          # Forbid assigning a single module directly to a retired namespace.
          # Anchored on "=" so nested groups (flake.nixosModules.storage.x)
          # and hyphenated names (flake.nixosModules.boot-redundancy) pass.
          if grep -rqE "flake\.nixosModules\.desktop[[:space:]]*=" \
            modules/ --include="*.nix"; then exit 1; fi
          if grep -rqE "flake\.nixosModules\.audio[[:space:]]*=" \
            modules/ --include="*.nix"; then exit 1; fi
          if grep -rqE "flake\.nixosModules\.boot[[:space:]]*=" \
            modules/ --include="*.nix"; then exit 1; fi
          if grep -rqE "flake\.nixosModules\.storage[[:space:]]*=" \
            modules/ --include="*.nix"; then exit 1; fi
      - name: Check import-tree usage
        run: grep -q "import-tree.*modules" flake.nix || exit 1
      - name: Check no literal imports
        run: |
          # Same multi-line detector as the generation-manager score check
          # (modules/apps/generation-manager.nix); keep the two in sync.
          # The previous single-line grep missed every path placed on a line
          # after "imports = [". Paths with any segment starting with "_"
          # are outside import-tree discovery and stay exempt.
          # shellcheck disable=SC2016
          detector='
            FNR == 1 { inblock = 0; depth = 0 }
            {
              line = $0
              sub(/#.*/, "", line)
              if (!inblock && line ~ /^[[:space:]]*imports[[:space:]]*=/) {
                inblock = 1
                depth = 0
              }
              if (inblock) {
                tmp = line
                while (match(tmp, "\\.\\.?/[A-Za-z0-9_./-]+")) {
                  p = substr(tmp, RSTART, RLENGTH)
                  n = split(p, parts, "/")
                  exempt = 0
                  for (i = 1; i <= n; i++) {
                    if (substr(parts[i], 1, 1) == "_") {
                      exempt = 1
                      break
                    }
                  }
                  if (!exempt) {
                    printf "%s:%d:%s\n", FILENAME, FNR, $0
                    break
                  }
                  tmp = substr(tmp, RSTART + RLENGTH)
                }
                depth += gsub(/\[/, "", line)
                depth -= gsub(/\]/, "", line)
                if (depth <= 0 && line ~ /;/) inblock = 0
              }
            }
          '
          # Self-test against a known violation so a broken awk cannot
          # produce a vacuous pass.
          selftest=$(printf '{\n  imports = [\n    ./x.nix\n  ];\n}\n' \
            | awk "$detector")
          if [ -z "$selftest" ]; then
            echo "literal-import detector self-test found nothing" >&2
            exit 1
          fi
          violations=$(find modules/ -name '*.nix' -print0 | \
            xargs -0 -r awk "$detector")
          if [ -n "$violations" ]; then
            echo "Literal path imports found:" >&2
            echo "$violations" >&2
            exit 1
          fi
